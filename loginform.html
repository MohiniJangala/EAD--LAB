<!DOCTYPE html>
<html>
    <head>
        <title>login form</title>
        <style>
            body{
                padding: 20px;
                background-color:lightgreen;
                text-align: center;
                font-family:Arial, Helvetica, sans-serif;
            }
            h2{
                text-align:center;
                color:black;
            }
            form{
                background-color: blueviolet;
                width:300px;
                padding:20px;
                margin:50px auto;
                border-radius: 8px;
            }
            label{
                font-weight: bold;
            }
            input{
                padding:8px;
                width:100%;
                margin-top:5px;
                margin-bottom:15px;
                border-radius:5px;
                border:1px solid grey;
            }
            button{
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: darkblue;
        }
        </style>
    </head>
    <body>
        <form>
            <label for="username">username:</label>
            <input type="text" id="username">
            <label for="password">password:</label>
            <input type="text" id="password">
            <button type="submit">login</button>
        </form>
    </body>
</html>
