<!DOCTYPE html>
<html>
    <head>
        <title>Timetable</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <style>
            body{
                text-align:center;
                padding:20px;
                table border:5px;
                 cellpadding:20px 
                 cellspacing: 1px;
            }
            h1{
                text-align:center;
                color:blue;
                margin-top: 20px;
            }
            table{
                box-shadow: 2px 2px 8px gray;
                border-radius:10px;
                over-flow:hidden;
            }
            th{
                background-color: aliceblue;
                color:black;
            }
        </style>
    </head>
    <body>
        <div class="container mt-5">
            <h1><b>IT-2 TimeTable</b></h1>
            <table class="table table-bordered text-center">
               <tr class="table-dark">
                <th>DAY / TIME</th>
                <th>9:10-10:10</th>
                <th>10:10-11:10</th>
                <th>11:15-12:15</th>
                <th>12:15-1:00</th>
                <th>1:00-2:00</th>
                <th>2:00-3:00</th>
                <th>3:00-4:00</th>
               </tr> 
               <tr>
                <td class="table-primary"><b>Monday</b></td>
                <td>PE-1</td>
                <td>EEA</td>
                <td>PQT</td>
                <td rowspan="5" class="table-warning align-middle">Lunch Break</td>
                <td>DBMS</td>
                <td>LIBRARY</td>
                <td>SPORTS</td>
               </tr>
               <tr>
                <td class="table-secondary">Tueday</td>
                <td colspan="3" class="table-info">DBMS LAB (B1)</td>
                <td>PQT</td>
                <td>EEA</td>
                <td>ES</td>
               </tr>
               <tr>
                <td class="table-primary"><b>Wednesday</b></td>
                <td>EAD</td>
                <td>PE-1</td>
                <td>PQT</td>
                <td>LIBRARY</td>
                <td colspan="2" class="table-success">MP-1</td>    
               </tr>
               <tr>
               <td class="table-success">Thursday</td>
               <td>DBMS</td>
                <td>EEA</td>
                <td>EAD</td>
                <td>PE-1</td>
                <td>ES</td>
                <td>PQT</td>
               </tr>
               <tr>
                <td class="table-info">Friday</td>.</td>
                <td class="table-primary"><b>Friday</b></td>
                <td colspan="3" class="table-info">EAD LAB-1</td>
                <td>DBMS</td>
                <td>EAD</td>
                <td>MENTOR</td>
               </tr>
            </table>
        </div> 
    </body>
</html>
