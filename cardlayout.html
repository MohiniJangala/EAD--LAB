<!DOCTYPE html>
<html>
<head>
    <title>Student Card</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: white;
            width: 300px;
            padding: 20px;
            border-radius: 10px;          /* Rounded corners */
            box-shadow: 0 4px 10px gray;  /* Shadow effect */
            text-align: center;
        }
        .card h2 {
            margin-bottom: 10px;
            color: darkblue;
        }
        .card p {
            font-size: 14px;
            color: #333;
        }
        .card button {
            margin-top: 15px;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background-color: darkblue;
            color: white;
            cursor: pointer;
        }
        .card button:hover {
            background-color: navy;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Mohini Jangala</h2>
    <p>B.Tech Student - Information Technology</p>
    <button>View Profile</button>
</div>
</body>
</html>
