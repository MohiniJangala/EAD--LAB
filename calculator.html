<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                display:flex;
                justify-content: center;
                height:100vh;
                align-items: center;
                background-color: lightslategray;
            }
            .calculator {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            width: 280px;
            }
             .display{
            background-color: aliceblue;
            padding:20px;
            border-radius:5px ;
            margin-bottom:15px;
            font-size:20px;
            height:50px;
            box-sizing: border-box;
            text-align:center;
            }
             .buttons{
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap:10px;
             }
             button{
                padding:10px;
                font-size:14px;
                border:none;
                border-radius:5px;
                cursor:pointer;
                box-sizing: border-box;
                width:100%;
                height:50px;
             }
             .number{
                background-color: #222;
                color:white;
             }
             .operator{
                background-color: #222;
                color:white;
             }
             button:hover{
                opacity: 0.8;

             }
        </style>
    </head>
    <body>
        <div class="calculator">
            <div class="display">0</div>
            <div class="buttons">
                <button class="operator">shift</button>
                <button class="operator">alpha</button>
                <button class="operator">modesetup</button>
                <button class="operator">on</button>
                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
                <button class="operator">DEL</button>
                <button class="operator">AC</button>
                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="operator">*</button> 
                <button class="operator">/</button> 
                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="operator">+</button>
                <button class="operator">-</button>
                <button class="number">c</button>
                <button class="operator">.</button> 
                <button class="operator">*10^x</button> 
                <button class="operator">ANS</button>
                <button class="operator">=</button>
             </div>
        </div>
    </body>
</html>
