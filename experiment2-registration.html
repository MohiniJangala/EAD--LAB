<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 2 - Student Registration Form</title>

    <!-- Bootstrap CSS CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html">Bootstrap Lab</a>
        </div>
    </nav>

    <main class="container my-5">
        <header class="text-center mb-4">
            <h1>Experiment 2</h1>
            <h2 class="h4">Responsive Student Registration Form</h2>
        </header>

        <!-- Alert is hidden at first and displayed after form submission -->
        <div id="successAlert" class="alert alert-success d-none" role="alert">
            Registration submitted successfully!
        </div>

        <form id="studentForm" class="row g-3">
            <div class="col-md-6">
                <label for="studentName" class="form-label">Student Name</label>
                <input type="text" class="form-control" id="studentName" placeholder="Enter student name" required>
            </div>

            <div class="col-md-6">
                <label for="rollNumber" class="form-label">Roll Number</label>
                <input type="text" class="form-control" id="rollNumber" placeholder="Enter roll number" required>
            </div>

            <div class="col-md-6">
                <label for="emailAddress" class="form-label">Email</label>
                <input type="email" class="form-control" id="emailAddress" placeholder="Enter email address" required>
            </div>

            <div class="col-md-6">
                <label for="department" class="form-label">Department</label>
                <select id="department" class="form-select" required>
                    <option value="">Choose department</option>
                    <option>Computer Science</option>
                    <option>Information Technology</option>
                    <option>Electronics</option>
                    <option>Mechanical</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label d-block">Gender</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label d-block">Subjects</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="subjectEad" value="EAD">
                    <label class="form-check-label" for="subjectEad">EAD</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="subjectDbms" value="DBMS">
                    <label class="form-check-label" for="subjectDbms">DBMS</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="subjectPqt" value="PQT">
                    <label class="form-check-label" for="subjectPqt">PQT</label>
                </div>
            </div>

            <div class="col-md-6">
                <label for="studentPhoto" class="form-label">Upload Photo</label>
                <input class="form-control" type="file" id="studentPhoto">
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-success">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>
    </main>

    <!-- Bootstrap JavaScript CDN link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // This code shows the success alert after clicking Submit.
        document.getElementById("studentForm").addEventListener("submit", function(event) {
            event.preventDefault();
            document.getElementById("successAlert").classList.remove("d-none");
        });
    </script>
</body>
</html>
